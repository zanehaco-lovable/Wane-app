:root{--ink:#0f1c1a;--ink2:#16302c;--paper:#f2eee4;--card:#fff;--sun:#f5c542;--sun-d:#d9a91f;--green:#1f6e5b;--green-d:#155244;--red:#c2412d;--muted:#6b7d78;--line:#e4dfd2;--ok:#1f8a5b;--blue:#2b6cb0;--shadow:0 10px 30px -14px rgba(15,28,26,.3);--r:16px;--rs:10px;--f:'Sora',system-ui,sans-serif;--fa:'Noto Kufi Arabic',serif;--scale:1}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:radial-gradient(120% 90% at 100% 0%,#16302c,#0f1c1a 55%) fixed;color:var(--ink);font-family:var(--f);font-size:calc(15px*var(--scale));-webkit-font-smoothing:antialiased}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:.95rem}
.app{min-height:100vh;display:flex;flex-direction:column}.hide{display:none!important}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(15,28,26,.7);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:30}

.spacer{flex:1}

.auth{width:100%;max-width:940px;display:grid;grid-template-columns:1.1fr .9fr;background:var(--card);border-radius:22px;overflow:hidden;box-shadow:var(--shadow)}
.auth .hero{padding:40px 34px;background:linear-gradient(140deg,#16302c,#0f1c1a);color:#fff;position:relative;overflow:hidden}
.auth .hero h1{font-size:2rem;font-weight:800;line-height:1.15;margin-bottom:12px}.auth .hero p{color:#bcd3cd;line-height:1.7}

.auth .form{padding:38px 32px;display:flex;flex-direction:column;gap:12px}
.field label{font-size:.78rem;font-weight:700;color:var(--muted);display:block;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:var(--rs);outline:none;background:#fbfaf6}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.demo-accts{display:grid;gap:8px}
.demo-card{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1.5px solid var(--line);border-radius:var(--rs);background:#fbfaf6;text-align:start;width:100%}
.demo-card:hover{border-color:var(--green)}.demo-card .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-weight:800;color:#fff;flex:0 0 auto}
.demo-card small{color:var(--muted);font-size:.72rem;display:block}
.err{color:var(--red);font-size:.82rem;font-weight:700;min-height:1em}
.lang{display:flex;align-items:center;gap:6px;background:#fbfaf6;border:1.5px solid var(--line);border-radius:999px;padding:7px 11px;cursor:pointer}
.lang select{flex:1;background:transparent;border:none;outline:none;font-weight:600;font-size:.84rem;color:var(--ink);cursor:pointer}
.btn{border-radius:11px;padding:11px 15px;font-weight:800;font-size:.86rem;background:var(--sun);color:#0f1c1a;transition:.12s;white-space:nowrap}
.btn:hover{background:var(--sun-d)}.btn.green{background:var(--green);color:#fff}.btn.green:hover{background:var(--green-d)}
.btn.ghost{background:#efece3;color:var(--ink);border:1.5px solid var(--line)}.btn.dark{background:var(--ink);color:#fff}.btn.red{background:var(--red);color:#fff}
.btn.sm{padding:8px 11px;font-size:.78rem;border-radius:9px}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.block{display:block;width:100%;text-align:center}
.shell{flex:1;display:grid;grid-template-columns:240px 1fr;min-height:0}
.side{background:#fff;border-inline-end:1px solid var(--line);padding:14px 12px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.side-user{display:flex;align-items:center;gap:10px;padding:11px;border-radius:var(--rs);background:#f5f3ec;border:1px solid var(--line)}
.side-user .av{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;flex:0 0 auto}
.side-user .nm{font-weight:700;font-size:.9rem;margin-bottom:3px}
.side-nav{display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);font-weight:600;font-size:.88rem;color:var(--ink2);width:100%;text-align:start}
.nav-item:hover{background:#f1efe7}.nav-item.on{background:var(--ink);color:#fff}.nav-item .ic{width:18px;text-align:center}
.side .sp{flex:1}
.side-ctl{display:flex;flex-direction:column;gap:8px}
.net{display:flex;align-items:center;justify-content:center;gap:7px;font-size:.78rem;background:#fbfaf6;border:1.5px solid var(--line);border-radius:999px;padding:8px;font-weight:700;color:var(--ink2)}
.net.off{color:var(--red);border-color:#f0c9c0;background:#fbeae6}.net .led{width:9px;height:9px;border-radius:50%;background:var(--ok)}.net.off .led{background:var(--red)}
.main{background:var(--paper);overflow:auto;padding:24px 28px}
.page-h{margin-bottom:18px}.page-h h1{font-size:1.45rem;font-weight:800}.page-h p{color:var(--muted);font-size:.88rem;margin-top:2px}
.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}

.stat .n{font-size:1.9rem;font-weight:800;color:var(--green)}.stat .l{color:var(--muted);font-size:.82rem;font-weight:600;margin-top:3px}

.node.unlocked .dot{background:var(--sun);color:#0f1c1a}.node.completed .dot{background:var(--ok);color:#fff}

.voucher .qr{width:84px;height:84px;flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;overflow:hidden}

.toast.show{opacity:1;inset-block-end:30px}

function allLevels(){return [...LV,...S.curriculum.map((c,i)=>({id:c.id,o:LV.length+i+1,n:{en:c.title,ar:c.title,ckb:c.title,kmr:c.title,diq:c.title,fr:c.title},lessons:c.lessons}))]}
function pageLearn(){
 return H(t('learn'),t('pass'))+`<div>`+allLevels().map(l=>{
  const st=S.progress[l.id]||(l.o<=LV.length?'locked':'unlocked');const sc=S.scores[l.id];const ic=st==='completed'?'✓':st==='unlocked'?'◆':'🔒';const can=st!=='locked';
  return `<div class="node ${st}"><div class="dot">${ic}</div><div class="m"><h3>${t('level')} ${l.o} · ${esc(lvName(l))}</h3><small>${st==='completed'?`${t('score')}: ${sc||'—'}%`:t(st)}</small></div>
   <button class="btn sm ${st==='completed'?'green':''}" data-quiz="${l.id}" ${can?'':'disabled'}>${st==='completed'?t('review'):t('start')}</button></div>`;
 }).join('')+`</div>`;
}
function genQ(){const pool=[
  {q:'Min sêv ____ . (xwarin, past)',o:['xwar','dixwim','bixwe','xwarin'],a:0},
  {q:'Choose the ergative subject (past transitive):',o:['Ez','Min','Tu','Em'],a:1},
  {q:'وشەی ڕاست بۆ «كتاب»:',o:['پەرتووک','نامە','قەڵەم','مێز'],a:0},
  {q:'Hejmara "sê" bi îngilîzî:',o:['two','three','four','five'],a:1}];
 return [...pool].sort(()=>Math.random()-.5).slice(0,4);}
function pageQuiz(){
 const Q=S.quiz,it=Q.items[Q.i];
 if(Q.done){const p=Q.score>=80;return `<div style="max-width:560px;margin:30px auto"><div class="card" style="text-align:center">
   <div style="font-size:3rem">${p?'🎉':'📚'}</div><h2 style="margin:8px 0">${t('score')}: ${Q.score}%</h2>
   <p style="color:${p?'var(--ok)':'var(--red)'};font-weight:800;margin-bottom:16px">${p?t('completed'):t('review')}</p>
   <button class="btn" id="qback">OK</button></div></div>`}
 return `<div style="max-width:560px;margin:0 auto"><p style="color:var(--muted);margin-bottom:10px">${Q.i+1}/${Q.items.length} · ${t('pass')}</p>
  <div class="card"><h2 style="font-size:1.15rem;margin-bottom:14px">${smart(it.q)}</h2>
  ${it.o.map((o,i)=>{let c='node';let st='';if(Q.rev){if(i===it.a)st='completed';else if(i===Q.picked[Q.i])st='locked'}else if(Q.picked[Q.i]===i)st='unlocked';return `<button class="node ${st}" style="width:100%;text-align:start" data-o="${i}" ${Q.rev?'disabled':''}><div class="m"><h3 style="font-size:.95rem">${smart(o)}</h3></div></button>`}).join('')}
  ${Q.rev?`<button class="btn block" id="qnext">${Q.i+1<Q.items.length?'→':'✓'}</button>`:`<button class="btn green block" id="qsub" ${Q.picked[Q.i]==null?'disabled':''}>OK</button>`}
  </div></div>`;
}
function finishQuiz(){const Q=S.quiz;let r=0;Q.items.forEach((it,i)=>{if(Q.picked[i]===it.a)r++});Q.score=Math.round(100*r/Q.items.length);Q.done=true;
 if(Q.score>=80){S.scores[Q.level]=Q.score;S.progress[Q.level]='completed';const cur=allLevels().find(l=>l.id===Q.level);const nx=allLevels().find(l=>l.o===((cur&&cur.o)||0)+1);if(nx&&S.progress[nx.id]==='locked')S.progress[nx.id]='unlocked'}save();render()}

  </div></div>`;

function walletOp(kind){const w=wallet(S.user.id);const now=new Date().toISOString().slice(0,10);
 if(kind==='sub'){if(w.balance<999){toast(t('topup'));return}w.balance-=999;w.tx.unshift({type:'SUBSCRIPTION',amount:-999,date:now})}
 if(kind==='top'){w.balance+=2000;w.tx.unshift({type:'TOPUP',amount:2000,date:now})}
 if(kind==='pay'){if(w.balance<=0){toast(t('noTx'));return}const a=w.balance;w.balance=0;w.tx.unshift({type:'PAYOUT',amount:-a,date:now})}
 save();render();
}
function redeemVoucher(code){const v=S.vouchers.find(x=>x.code===(code||'').trim().toUpperCase());
 if(!v){toast(t('bad'));return}if(v.status==='REDEEMED'){toast(t('redeemed'));return}
 const w=wallet(S.user.id);w.balance+=Math.round(v.amount*100);w.tx.unshift({type:'VOUCHER',amount:Math.round(v.amount*100),date:new Date().toISOString().slice(0,10)});
 if(v.status==='ACTIVE'&&v.ownerAgent){v.status='SOLD';v.buyer=S.user.email}else{v.status='REDEEMED'}
 save();render();toast('+ $'+v.amount.toFixed(2));
}

 // accounts: suspend with reason / activate
 document.querySelectorAll('[data-suspend]').forEach(b=>b.onclick=()=>{const u=S.users.find(x=>x.id===b.dataset.suspend);const why=prompt(t('reasonQ'));if(why==null)return;u.status='SUSPENDED';u.reason=why.trim();save();render();toast(t('suspended'))});
 document.querySelectorAll('[data-activate]').forEach(b=>b.onclick=()=>{const u=S.users.find(x=>x.id===b.dataset.activate);u.status='ACTIVE';u.reason='';save();render()});
 // treasury
 if($('tr-add'))$('tr-add').onclick=()=>{const a=Math.round((+$('tr-amt').value||0)*100);if(a<=0)return;S.treasury.balance+=a;save();render();toast(t('prepBalance')+' ✓')};
 // agent buys card from admin
 document.querySelectorAll('[data-buycard]').forEach(b=>b.onclick=()=>{const v=S.vouchers.find(x=>x.id===b.dataset.buycard);if(!v||v.ownerAgent)return;const price=Math.round(v.amount*100*S.wholesalePct/100);const w=wallet(S.user.id);if(w.balance<price){toast(t('insufficientTreasury'));return}w.balance-=price;w.tx.unshift({type:'BUY_CARDS',amount:-price,date:new Date().toISOString().slice(0,10)});S.treasury.balance+=price;v.ownerAgent=S.user.id;save();render();toast(t('buyNow')+' ✓')});
 // teacher create/publish course
 if($('co-create'))$('co-create').onclick=()=>{const tt=($('co-title').value||'').trim();const pr=Math.max(1,+$('co-price').value||20);const sub=$('co-sub').value;if(!tt)return;S.courses.push({id:'co'+Date.now(),teacherId:S.user.id,title:tt,subject:sub,price:pr,published:false});save();render();toast(t('createCourse')+' ✓')};
 document.querySelectorAll('[data-pubcourse]').forEach(b=>b.onclick=()=>{if(!teacherHasCurriculum(S.user.id)){toast(t('curriculumReq'));return}const c=S.courses.find(x=>x.id===b.dataset.pubcourse);c.published=true;save();render();toast(t('publishCourse')+' ✓')});
 // student enroll + buy course
 document.querySelectorAll('[data-enroll]').forEach(b=>b.onclick=()=>{const cid=b.dataset.enroll;if(S.enrollments.find(e=>e.courseId===cid&&e.studentId===S.user.id))return;S.enrollments.push({id:'en'+Date.now(),courseId:cid,studentId:S.user.id,status:'PENDING'});save();render();toast(t('enroll')+' ✓')});
 document.querySelectorAll('[data-buycourse]').forEach(b=>b.onclick=()=>{const c=S.courses.find(x=>x.id===b.dataset.buycourse);const cost=Math.round(c.price*100);const w=wallet(S.user.id);if(w.balance<cost){toast(t('insufficientTreasury'));return}w.balance-=cost;w.tx.unshift({type:'COURSE',amount:-cost,date:new Date().toISOString().slice(0,10)});const comm=Math.round(cost*S.platformPct/100);const tw=wallet(c.teacherId);tw.balance+=(cost-comm);tw.tx.unshift({type:'COURSE',amount:(cost-comm),date:new Date().toISOString().slice(0,10)});S.sales.push({id:'sa'+Date.now(),courseId:c.id,studentId:S.user.id,amount:cost,method:'wallet',commission:comm});const e=S.enrollments.find(x=>x.courseId===c.id&&x.studentId===S.user.id);if(e)e.status='CONFIRMED';save();render();toast(t('confirmed')+' ✓')});
 // teacher accept enrollment + cash sale
 document.querySelectorAll('[data-accept]').forEach(b=>b.onclick=()=>{const e=S.enrollments.find(x=>x.id===b.dataset.accept);e.status='ACCEPTED';save();render();toast(t('accept')+' ✓')});
 if($('cash-sell'))$('cash-sell').onclick=()=>{const cid=$('cash-course').value;const c=S.courses.find(x=>x.id===cid);if(!c)return;const cost=Math.round(c.price*100);const comm=Math.round(cost*S.platformPct/100);const tw=wallet(S.user.id);tw.balance+=(cost-comm);tw.tx.unshift({type:'COURSE',amount:(cost-comm),date:new Date().toISOString().slice(0,10)});S.sales.push({id:'sa'+Date.now(),courseId:c.id,studentId:null,amount:cost,method:'cash',commission:comm});save();render();toast(t('confirmed')+' ✓')};
 // search: teachers
 if($('q-teacher'))$('q-teacher').oninput=e=>{S.q.teacher=e.target.value};
 if($('q-tsub'))$('q-tsub').onchange=e=>{S.q.tSubject=e.target.value;render()};
 if($('q-teacher'))$('q-teacher').onkeydown=e=>{if(e.key==='Enter')render()};
 if($('q-tclear'))$('q-tclear').onclick=()=>{S.q.teacher='';S.q.tSubject='';render()};
 // search: courses
 if($('q-course'))$('q-course').oninput=e=>{S.q.course=e.target.value};
 if($('q-course'))$('q-course').onkeydown=e=>{if(e.key==='Enter')render()};
 if($('q-csub'))$('q-csub').onchange=e=>{S.q.cSubject=e.target.value;render()};
 if($('q-cmax'))$('q-cmax').oninput=e=>{S.q.cMax=e.target.value};
 if($('q-cmax'))$('q-cmax').onkeydown=e=>{if(e.key==='Enter')render()};
 if($('q-cclear'))$('q-cclear').onclick=()=>{S.q.course='';S.q.cSubject='';S.q.cMax='';render()};
 // quiz builder
 if($('q-course'))0;
 if($('nq-ai'))$('nq-ai').onclick=()=>{const u=S.user.dialect;const d=aiDraft(u);$('nq-q').value=d.q;[0,1,2,3].forEach(j=>{$('nq-o'+j).value=d.options[j]});document.querySelector(`input[name="nq-a"][value="${d.answer}"]`).checked=true;$('nq-m').value=d.marks;toast(t('aiAssist'))};
 if($('nq-add'))$('nq-add').onclick=()=>{const q=($('nq-q').value||'').trim();const opts=[0,1,2,3].map(j=>($('nq-o'+j).value||'').trim());if(!q||opts.some(o=>!o))return;const ans=+document.querySelector('input[name="nq-a"]:checked').value;const m=Math.max(1,+$('nq-m').value||5);S._qdraft.courseId=$('q-course').value;S._qdraft.title=$('q-title').value;S._qdraft.questions.push({q,options:opts,answer:ans,marks:m});render()};
 if($('q-save'))$('q-save').onclick=()=>{const d=S._qdraft;d.courseId=$('q-course').value;d.title=($('q-title').value||'').trim()||'Quiz';if(!d.courseId||!d.questions.length)return;S.quizzes.push({id:'qz'+Date.now(),courseId:d.courseId,title:d.title,questions:d.questions});S._qdraft=null;save();render();toast(t('saveQuiz')+' ✓')};
 // student take quiz
 document.querySelectorAll('[data-takequiz]').forEach(b=>b.onclick=()=>{S.cq={quizId:b.dataset.takequiz,i:0,picked:[],done:false,score:0};render()});
 document.querySelectorAll('[data-cqo]').forEach(b=>b.onclick=()=>{S.cq.picked[S.cq.i]=+b.dataset.cqo;render()});
 if($('cq-next'))$('cq-next').onclick=()=>{const qz=S.quizzes.find(x=>x.id===S.cq.quizId);if(S.cq.i+1<qz.questions.length){S.cq.i++;render()}else{let sc=0;qz.questions.forEach((q,i)=>{if(S.cq.picked[i]===q.answer)sc+=q.marks});S.cq.score=sc;S.cq.done=true;const tot=qz.questions.reduce((s,q)=>s+q.marks,0);S.attempts=S.attempts.filter(a=>!(a.quizId===qz.id&&a.studentId===S.user.id));S.attempts.push({id:'at'+Date.now(),quizId:qz.id,studentId:S.user.id,score:sc,total:tot});save();render()}};
 if($('cq-close'))$('cq-close').onclick=()=>{S.cq=null;render()};
 // committee (teacher): propose questions
 document.querySelectorAll('[data-cqai]').forEach(b=>b.onclick=()=>{const cid=b.dataset.cqai;const c=S.committees.find(x=>x.id===cid);const d=aiDraft(c.dialect);$('cq-q-'+cid).value=d.q;[0,1,2,3].forEach(j=>{$('cq-o'+j+'-'+cid).value=d.options[j]});document.querySelector(`input[name="cq-a-${cid}"][value="${d.answer}"]`).checked=true;$('cq-m-'+cid).value=d.marks;toast(t('aiAssist'))});
 document.querySelectorAll('[data-cqadd]').forEach(b=>b.onclick=()=>{const cid=b.dataset.cqadd;const q=($('cq-q-'+cid).value||'').trim();const opts=[0,1,2,3].map(j=>($('cq-o'+j+'-'+cid).value||'').trim());if(!q||opts.some(o=>!o))return;const ans=+document.querySelector(`input[name="cq-a-${cid}"]:checked`).value;const m=Math.max(1,+$('cq-m-'+cid).value||5);const c=S.committees.find(x=>x.id===cid);S.examBank.push({id:'eb'+Date.now(),committeeId:cid,dialect:c.dialect,q,options:opts,answer:ans,marks:m,status:'PROPOSED',authorId:S.user.id});save();render();toast(t('proposeQ')+' ✓')});
 // committees (admin): create + approve questions
 if($('cm-create'))$('cm-create').onclick=()=>{const nm=($('cm-name').value||'').trim();if(!nm)return;const mem=[...document.querySelectorAll('.cm-mem:checked')].map(x=>x.value);S.committees.push({id:'cm'+Date.now(),name:nm,dialect:$('cm-dia').value,memberIds:mem,status:'ACTIVE'});save();render();toast(t('createCommittee')+' ✓')};
 document.querySelectorAll('[data-approveq]').forEach(b=>b.onclick=()=>{const q=S.examBank.find(x=>x.id===b.dataset.approveq);q.status='APPROVED';save();render();toast(t('approveQ')+' ✓')});
 // teacher applications (admin)
 document.querySelectorAll('[data-tapprove]').forEach(b=>b.onclick=()=>{const a=S.teacherApps.find(x=>x.id===b.dataset.tapprove);a.status='APPROVED';const u=S.users.find(x=>x.id===a.userId);if(u){u.role='TEACHER';u.approved=true;u.subjects=a.subjects;u.bio=a.bio}save();render();toast(t('approveTeacher')+' ✓')});
 document.querySelectorAll('[data-treject]').forEach(b=>b.onclick=()=>{const a=S.teacherApps.find(x=>x.id===b.dataset.treject);a.status='REJECTED';save();render()});
 // become teacher (student applies)
 if($('ta-submit'))$('ta-submit').onclick=()=>{const subs=[...document.querySelectorAll('.ta-sub:checked')].map(x=>x.value);const bio=($('ta-bio').value||'').trim();const exp=($('ta-exp').value||'').trim();const files=$('ta-cert').files;const certs=files?[...files].map(f=>f.name):[];if(!subs.length||!bio){toast(t('bad'));return}const ex=S.teacherApps.find(a=>a.userId===S.user.id);const rec={id:'ta'+Date.now(),userId:S.user.id,name:S.user.name,subjects:subs,bio,experience:exp,certs,status:'PENDING'};if(ex)Object.assign(ex,rec);else S.teacherApps.push(rec);save();render();toast(t('submitApp')+' ✓')};
 // license print + agent sign
 document.querySelectorAll('[data-print-license]').forEach(b=>b.onclick=(e)=>{e.preventDefault();const L=S.licenses.find(x=>x.id===b.dataset.printLicense);printCard(`<div style="border:4px solid #1f6e5b;padding:34px"><h1 style="text-align:center">Wane — ${t('license')}</h1><h3 style="text-align:center">${esc(L.agentName)}</h3><p style="line-height:1.8">${esc(L.terms)}</p><div style="display:flex;justify-content:space-between;margin-top:40px"><div>${t('adminSigned')}: ${L.adminSigned?'✓ Wane':'—'}</div><div>${t('agentSigned')}: ${L.agentSigned?'✓ '+esc(L.agentName):'—'}</div></div></div>`)});
 document.querySelectorAll('[data-signlicense]').forEach(b=>b.onclick=()=>{const L=S.licenses.find(x=>x.id===b.dataset.signlicense);L.agentSigned=true;L.signedAt=new Date().toISOString().slice(0,10);save();render();toast(t('signed')+' ✓')});
}
window.addEventListener('online',()=>{S.online=true;render()});
window.addEventListener('offline',()=>{S.online=false;render()});
if(!S.wallets['g'])S.wallets['g']={balance:20000,tx:[]};
render();
</script>
</body>
</html>
