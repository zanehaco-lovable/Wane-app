<!DOCTYPE html><html lang="en" dir="ltr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Redeem · Wane</title>
<style>body{font-family:system-ui,sans-serif;background:#0f1c1a;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0;padding:20px}
.c{background:#16302c;border:1px solid #244;border-radius:18px;padding:30px;max-width:420px;width:100%;text-align:center}
.code{font-size:1.4rem;font-weight:800;letter-spacing:2px;margin:14px 0}
a.btn,button{display:inline-block;margin-top:10px;padding:12px 18px;border-radius:10px;background:#f5c542;color:#0f1c1a;font-weight:800;text-decoration:none;border:none;cursor:pointer}
.k{color:#bcd3cd;font-size:.9rem;line-height:1.6}</style></head><body>
<div class="c"><h1>Wane balance card</h1><div class="code" id="code">—</div>
<p class="k">Open the app, go to Wallet, and paste this code to add the balance to your account.</p>
<a class="btn" href="index.html#wallet">Open Wallet</a>
<button id="copy">Copy code</button></div>
<script>
const code=new URLSearchParams(location.search).get('code')||'';
document.getElementById('code').textContent=code||'No code';
document.getElementById('copy').onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(code);};
</script></body></html>
