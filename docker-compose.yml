services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wane
      POSTGRES_USER: wane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wane}
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wane -d wane"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://wane:${POSTGRES_PASSWORD:-wane}@db:5432/wane
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me}
      CERT_SECRET: ${CERT_SECRET:-dev_cert_pepper}
      VERIFY_BASE_URL: ${VERIFY_BASE_URL:-http://localhost:8080/verify.html}
      AI_API_KEY: ${AI_API_KEY:-}
      SPEECH_API_KEY: ${SPEECH_API_KEY:-}
      SPEECH_BASE_URL: ${SPEECH_BASE_URL:-}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
