<!DOCTYPE html><html lang="en" dir="ltr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verify certificate · Wane</title>
<style>
body{font-family:system-ui,sans-serif;background:#0f1c1a;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0;padding:20px}
.card{background:#16302c;border:1px solid #244;border-radius:18px;padding:30px;max-width:440px;width:100%;text-align:center}
.ok{color:#1f8a5b;font-weight:800}.bad{color:#c2412d;font-weight:800}
input{padding:11px 13px;border-radius:10px;border:1px solid #356;background:#0f1c1a;color:#fff;width:60%}
button{padding:11px 16px;border-radius:10px;border:none;background:#f5c542;color:#0f1c1a;font-weight:800;cursor:pointer}
.row{display:flex;gap:8px;justify-content:center;margin-top:14px}
.k{color:#bcd3cd}.v{font-weight:700}
table{width:100%;margin-top:16px;border-collapse:collapse}td{padding:7px 4px;border-bottom:1px solid #244;text-align:left}
</style></head><body>
<div class="card">
  <h1>Wane · Certificate verification</h1>
  <p class="k" id="hint">Enter a certificate ID (e.g. WANE-1A2B-3C4D).</p>
  <div class="row"><input id="id" placeholder="WANE-XXXX-YYYY"><button id="go">Verify</button></div>
  <div id="out"></div>
</div>
<script>
// Points at the backend. In production set this to your API origin.
const API = window.WANE_API || 'http://localhost:4000';
const params = new URLSearchParams(location.search);
const idInput = document.getElementById('id');
if (params.get('id')) { idInput.value = params.get('id'); }
async function verify(){
  const id = idInput.value.trim(); if(!id) return;
  const out = document.getElementById('out'); out.innerHTML = 'Checking…';
  try{
    const r = await fetch(`${API}/api/certificate/verify/${encodeURIComponent(id)}`);
    const d = await r.json();
    if(!d.valid){ out.innerHTML = '<p class="bad">Not found — this certificate is not valid.</p>'; return; }
    out.innerHTML = `<p class="ok">Valid certificate</p>
      <table>
        <tr><td class="k">Name</td><td class="v">${d.full_name}</td></tr>
        <tr><td class="k">ID</td><td class="v">${d.public_id}</td></tr>
        <tr><td class="k">Reading</td><td class="v">${d.scores.reading}%</td></tr>
        <tr><td class="k">Writing</td><td class="v">${d.scores.writing}%</td></tr>
        <tr><td class="k">Speaking</td><td class="v">${d.scores.speaking}%</td></tr>
        <tr><td class="k">Issued</td><td class="v">${new Date(d.issued_at).toDateString()}</td></tr>
      </table>`;
  }catch(e){ out.innerHTML = '<p class="bad">Cannot reach the verification server.</p>'; }
}
document.getElementById('go').onclick = verify;
if (params.get('id')) verify();
</script></body></html>
